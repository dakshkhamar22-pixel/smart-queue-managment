<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Queue Management</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>🎫 Smart Queue Management</h1>
    <nav>
      <a href="/" class="active">Home</a>
      <a href="/admin">Admin</a>
    </nav>
  </header>

  <main>
    <!-- Live Queue Status -->
    <section id="queue-status" class="card">
      <h2>Live Queue Status</h2>
      <div class="status-grid">
        <div class="status-item">
          <span class="label">Now Serving</span>
          <span id="currently-serving" class="value serving">--</span>
        </div>
        <div class="status-item">
          <span class="label">Next Up</span>
          <span id="next-in-queue" class="value next">--</span>
        </div>
        <div class="status-item">
          <span class="label">Waiting</span>
          <span id="waiting-count" class="value">0</span>
        </div>
      </div>
      <div id="waiting-list" class="waiting-list"></div>
    </section>

    <!-- Take Token Form -->
    <section id="take-token" class="card">
      <h2>Take a Token</h2>
      <form id="token-form">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required placeholder="Your name">
        </div>
        <div class="form-group">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" required placeholder="Your phone number">
        </div>
        <button type="submit" class="btn btn-primary">Get Token</button>
      </form>
    </section>

    <!-- Token Result -->
    <section id="token-result" class="card hidden">
      <h2>Your Token</h2>
      <div class="token-display">
        <div class="token-number" id="your-token-number">--</div>
        <p>Position: <span id="your-position">--</span></p>
        <p>Estimated Wait: <span id="your-wait-time">--</span> minutes</p>
        <p>Status: <span id="your-status" class="badge">--</span></p>
      </div>
      <div id="notification-area" class="notification hidden">
        🔔 It's your turn! Please proceed to the counter.
      </div>
      <button id="check-status-btn" class="btn btn-secondary">Check Status</button>
    </section>

    <!-- Check Existing Token -->
    <section id="check-token" class="card">
      <h2>Check Existing Token</h2>
      <div class="form-group inline">
        <input type="number" id="check-token-number" placeholder="Enter token number" min="1">
        <button id="check-btn" class="btn btn-secondary">Check</button>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2024 Smart Queue Management System</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
